# Central configuration for the pipeline.
# Paths are relative to repo root unless absolute.

project:
  cancer_project: "TCGA-PRAD"
  rna_seq_workflow: "HTSeq - Counts"
  sample_type: "Primary Tumor"

paths:
  data_dir: "data"
  results_dir: "results"
  cache_dir: "cache"

inputs:
  dna_metabolism_genes: "data/gene_sets/dna_metabolism_genes.txt"
  immune_gmt: "data/gene_sets/immune_signatures.gmt"

outputs:
  tcga_dir: "results/tcga"
  deg_dir: "results/deg"
  enrichment_dir: "results/enrichment"
  clustering_dir: "results/clustering"
  immune_dir: "results/immune"

parameters:
  # edgeR
  fdr_cutoff: 0.05
  logfc_cutoff: 1.0

  # consensus clustering
  max_k: 6
  reps: 100
  p_item: 0.8
  p_feature: 0.8
  cluster_alg: "hc"
  distance: "pearson"

  # ssGSEA
  ssgsea: true
